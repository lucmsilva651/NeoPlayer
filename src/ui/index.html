<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="electron" content="app">
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="../lib/codicons/dist/codicon.css">
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="titlebar">
    <span class="logo app-name">?</span>
    <div class="titlebar-actions">
      <span id="aboutAppBtn" class="titlebar-btn">
        <i class="codicon codicon-info"></i>
        About
      </span>
      <span id="openFileBtn" class="titlebar-btn">
        <i class="codicon codicon-folder-opened"></i>
        Open file
      </span>
    </div>
  </div>
  <main>
    <div class="input-section">
      <p id="instruct">
        <i class="codicon codicon-arrow-right" aria-hidden="true"></i>
        Enter a URL, module ID, or drag & drop a file
      </p>
      <div class="input-play-row">
        <div class="input-wrapper">
          <i class="codicon codicon-link input-icon"></i>
          <input autocomplete="off" type="url" id="url" required placeholder="https:// or module ID" />
        </div>
        <button id="inputPlayBtn" title="Load and play">
          <i class="codicon codicon-play"></i>
          Load
        </button>
        <input type="file" id="fileInput" style="display: none;">
      </div>
    </div>
    <div class="mod-details" id="modDetails">
      <div class="mod-now-playing">
        <span class="label">NOW PLAYING</span>
        <h2 id="modTitle">—</h2>
        <span class="mod-artist" id="modArtist">—</span>
      </div>
      <div class="mod-divider"></div>
      <div class="mod-details-grid">
        <div class="meta-col">
          <div class="meta-item">
            <span class="meta-key">TYPE</span>
            <span class="meta-val" id="modType">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">TRACKER</span>
            <span class="meta-val" id="modTracker">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">DATE</span>
            <span class="meta-val" id="modDate">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">SOURCE</span>
            <span class="meta-val" id="modSource">—</span>
          </div>
        </div>
        <div class="meta-col">
          <div class="meta-item">
            <span class="meta-key">CHANNELS</span>
            <span class="meta-val" id="modChannels">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">INSTRUMENTS</span>
            <span class="meta-val" id="modInstruments">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">SAMPLES</span>
            <span class="meta-val" id="modSamples">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">PATTERNS</span>
            <span class="meta-val" id="modPatterns">—</span>
          </div>
        </div>
      </div>
      <div class="mod-msg-row">
        <button id="moduleMsgBtn">
          <i class="codicon codicon-list-unordered"></i>
          Module text / instruments
        </button>
      </div>
    </div>
  </main>
  <div class="bottom-bar">
    <div class="time-display">
      <span id="modDurAct">00:00</span>
      <span class="time-sep">/</span>
      <span id="modDurTot">00:00</span>
    </div>
    <div class="playback-controls">
      <button class="ctrl-btn" id="stopBtn" title="Stop">
        <i class="codicon codicon-debug-stop"></i>
      </button>
      <button class="ctrl-btn" id="loopToggle" title="Toggle loop">
        <i class="codicon codicon-sync-ignored"></i>
      </button>
      <button class="ctrl-btn ctrl-play" id="playBtn" title="Play/Pause">
        <i class="codicon codicon-debug-pause"></i>
      </button>
    </div>
  </div>
  <script type="module" src="js/index.js"></script>
</body>
</html>
